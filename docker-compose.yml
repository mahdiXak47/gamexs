services:
  db:
    image: postgres:16
    container_name: gamexs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gamexs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamexs}
      POSTGRES_DB: ${POSTGRES_DB:-gamexs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gamexs_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gamexs}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gamexs_pgdata:
