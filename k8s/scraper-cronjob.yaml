apiVersion: batch/v1
kind: CronJob
metadata:
  name: gamexs-scraper
  namespace: mahdixak-gamexs
spec:
  # 1:00 AM Tehran time = 21:30 UTC (Iran is UTC+3:30).
  # Adjust if your cluster runs in a different timezone.
  schedule: "30 21 * * *"

  # Never run two scrape jobs at the same time.
  concurrencyPolicy: Forbid

  # Keep logs from the last 1 successful and 3 failed jobs.
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      # Kill the job if it hasn't finished after 5 hours (prevents runaway pods).
      activeDeadlineSeconds: 18000

      # Don't retry automatically — a failed run should be investigated.
      backoffLimit: 0

      template:
        metadata:
          labels:
            app: gamexs-scraper
        spec:
          restartPolicy: Never

          containers:
            - name: scraper
              image: registry.hamdocker.ir/mahdixak/gamexs-scraper:latest

              command: ["bash", "scrape_all.sh"]

              env:
                - name: DATABASE_URL
                  value: "postgresql://gamexs:gamexs@gamexs-db.mahdixak-gamexs.svc:5432/gamexs"
                - name: IGDB_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: gamexs-secret-envs
                      key: IGDB_CLIENT_ID
                - name: IGDB_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: gamexs-secret-envs
                      key: IGDB_CLIENT_SECRET
                - name: S3_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: gamexs-secret-envs
                      key: S3_ENDPOINT_URL
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gamexs-secret-envs
                      key: S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gamexs-secret-envs
                      key: S3_SECRET_KEY
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: gamexs-secret-envs
                      key: S3_BUCKET
                - name: HTTPS_PROXY
                  value: "http://custom-xray.mahdixak-gamexs.svc:10809"
                - name: NO_PROXY
                  value: "gamexs-db.mahdixak-gamexs.svc,localhost,127.0.0.1,10.0.0.0/8"

              resources:
                requests:
                  cpu: "250m"
                  memory: "256Mi"
                limits:
                  cpu: "1000m"
                  memory: "512Mi"
